<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#1c1917">
        <title>NoCompris | Sense connexió</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family: "Instrument Sans", system-ui, sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background:
                    radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 32%),
                    linear-gradient(180deg, #fafaf9 0%, #f5f5f4 100%);
                color: #1c1917;
            }

            main {
                width: min(32rem, calc(100vw - 2rem));
                padding: 2rem;
                border-radius: 1.5rem;
                background: rgba(255, 255, 255, 0.88);
                border: 1px solid rgba(231, 229, 228, 0.9);
                box-shadow: 0 24px 60px rgba(28, 25, 23, 0.12);
            }

            h1 {
                margin: 0 0 0.75rem;
                font-size: clamp(2rem, 6vw, 2.75rem);
                line-height: 1;
            }

            p {
                margin: 0;
                line-height: 1.6;
            }

            strong {
                display: inline-block;
                margin-bottom: 0.75rem;
                font-size: 0.8rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: #a16207;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background:
                        radial-gradient(circle at top, rgba(251, 191, 36, 0.16), transparent 28%),
                        linear-gradient(180deg, #0c0a09 0%, #1c1917 100%);
                    color: #fafaf9;
                }

                main {
                    background: rgba(28, 25, 23, 0.82);
                    border-color: rgba(68, 64, 60, 0.9);
                    box-shadow: none;
                }

                strong {
                    color: #fbbf24;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <strong>NoCompris</strong>
            <h1>Estàs fora de línia</h1>
            <p>Quan recuperis la connexió, la llista i els canvis sincronitzaran de nou. Mentrestant pots tornar enrere o reintentar carregar la pàgina.</p>
        </main>
    </body>
</html>
