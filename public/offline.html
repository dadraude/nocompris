<!DOCTYPE html>
<html lang="ca">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#0c1117">
        <title>NoCompris | Sense connexió</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family: "Instrument Sans", system-ui, sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background:
                    radial-gradient(circle at top, rgba(255, 139, 94, 0.22), transparent 32%),
                    radial-gradient(circle at bottom right, rgba(82, 168, 161, 0.16), transparent 30%),
                    linear-gradient(180deg, #f7f3ec 0%, #efe8dc 100%);
                color: #171a1f;
            }

            main {
                width: min(32rem, calc(100vw - 2rem));
                padding: 2rem;
                border-radius: 2rem;
                background: rgba(255, 255, 255, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.7);
                box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            }

            h1 {
                margin: 0 0 0.75rem;
                font-size: clamp(2rem, 6vw, 2.75rem);
                line-height: 1;
            }

            p {
                margin: 0;
                line-height: 1.6;
            }

            strong {
                display: inline-block;
                margin-bottom: 0.75rem;
                font-size: 0.8rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: #2f8385;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background:
                        radial-gradient(circle at top, rgba(255, 125, 70, 0.18), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(127, 208, 203, 0.12), transparent 30%),
                        linear-gradient(180deg, #0c1117 0%, #162029 100%);
                    color: #eef3f4;
                }

                main {
                    background: rgba(16, 25, 33, 0.88);
                    border-color: rgba(255, 255, 255, 0.08);
                    box-shadow: none;
                }

                strong {
                    color: #7fd0cb;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <strong>NoCompris</strong>
            <h1>Estàs fora de línia</h1>
            <p>Quan recuperis la connexió, la llista i els canvis sincronitzaran de nou. Mentrestant pots tornar enrere o reintentar carregar la pàgina amb la mateixa claredat que dins l’app.</p>
        </main>
    </body>
</html>
